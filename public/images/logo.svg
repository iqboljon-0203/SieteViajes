<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <!-- Background Gold Gradient -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700" />
      <stop offset="25%" stop-color="#FFF8DC" />
      <stop offset="50%" stop-color="#D4AF37" />
      <stop offset="75%" stop-color="#FFF8DC" />
      <stop offset="100%" stop-color="#B8860B" />
    </linearGradient>

    <!-- Deep Blue Banner replacing the Flag -->
    <linearGradient id="bannerBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E3A8A" />
      <stop offset="50%" stop-color="#1D4ED8" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>

    <!-- Sky Gradient -->
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="50%" stop-color="#BAE6FD" />
      <stop offset="100%" stop-color="#FEF08A" />
    </linearGradient>

    <!-- Architectural Domes Gradient -->
    <linearGradient id="dome" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06B6D4" />
      <stop offset="40%" stop-color="#22D3EE" />
      <stop offset="100%" stop-color="#0369A1" />
    </linearGradient>
    
    <filter id="shadow">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-opacity="0.4" flood-color="#000" />
    </filter>

    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-opacity="0.8" flood-color="#FDE047" />
    </filter>

    <filter id="textShadow">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.5" flood-color="#000" />
    </filter>
  </defs>

  <!-- Ornate Outer Frame (Gold) -->
  <path d="M 400,20 
           C 520,-30 630,90 680,140 
           C 780,170 790,300 740,380 
           C 680,490 520,540 400,580 
           C 280,540 120,490 60,380 
           C 10,300 20,170 120,140 
           C 170,90 280,-30 400,20 Z" 
        fill="url(#gold)" filter="url(#shadow)" stroke="#111827" stroke-width="2" />

  <!-- Inner Dark Border -->
  <path d="M 400,45 
           C 500,0 590,110 630,160 
           C 720,190 730,290 690,350 
           C 640,440 500,490 400,530 
           C 300,490 160,440 110,350 
           C 70,290 80,190 170,160 
           C 210,110 300,0 400,45 Z" 
        fill="#0F172A" />

  <!-- Sky Window -->
  <path d="M 400,65 
           C 480,25 560,130 590,175 
           C 670,205 680,285 640,340
           L 160,340
           C 120,285 130,205 210,175
           C 240,130 320,25 400,65 Z" 
        fill="url(#sky)" />

  <!-- Sun -->
  <circle cx="400" cy="150" r="45" fill="#FEF08A" filter="url(#glow)" />

  <!-- Distant Mountains -->
  <path d="M 160 340 L 260 170 L 330 250 L 440 120 L 550 240 L 640 340 Z" fill="#F8FAFC" opacity="0.95"/>
  <path d="M 260 170 L 300 220 L 330 250 Z" fill="#E2E8F0" />
  <path d="M 440 120 L 490 190 L 550 240 Z" fill="#E2E8F0" />
  <path d="M 380 200 L 440 120 L 420 230 Z" fill="#CBD5E1" />

  <!-- Architectural Domes & Minarets -->
  <g transform="translate(0, 40)">
    <!-- Base platform -->
    <rect x="180" y="280" width="440" height="20" fill="url(#gold)" />
    
    <!-- Left Minaret -->
    <rect x="230" y="150" width="25" height="130" fill="#FCEABB" stroke="#B8860B" stroke-width="2" />
    <!-- Tiers on Minaret -->
    <rect x="225" y="190" width="35" height="6" fill="#06B6D4" />
    <rect x="225" y="240" width="35" height="6" fill="#06B6D4" />
    <path d="M 220 150 L 265 150 L 242.5 110 Z" fill="url(#dome)" stroke="#0F172A" stroke-width="1"/>
    
    <!-- Left Dome / Structure -->
    <rect x="270" y="210" width="60" height="70" fill="#FFE4B5" stroke="#B8860B" stroke-width="2" />
    <path d="M 255 210 C 255 140 345 140 345 210 Z" fill="url(#dome)" stroke="#0F172A" stroke-width="1.5" />
    
    <!-- Main portal (Iwan) -->
    <rect x="340" y="140" width="120" height="140" fill="#FFF8DC" stroke="#B8860B" stroke-width="2" />
    <!-- Outer Arch -->
    <path d="M 355 280 L 355 190 C 355 150 445 150 445 190 L 445 280 Z" fill="#0369A1" stroke="#06B6D4" stroke-width="4" />
    <!-- Inner Arch (Shadow) -->
    <path d="M 370 280 L 370 200 C 370 170 430 170 430 200 L 430 280 Z" fill="#0F172A" />

    <!-- Right Dome / Structure -->
    <rect x="470" y="220" width="50" height="60" fill="#FFE4B5" stroke="#B8860B" stroke-width="2" />
    <path d="M 460 220 C 460 160 530 160 530 220 Z" fill="url(#dome)" stroke="#0F172A" stroke-width="1.5" />

    <!-- Right Minaret -->
    <rect x="545" y="150" width="25" height="130" fill="#FCEABB" stroke="#B8860B" stroke-width="2" />
    <rect x="540" y="190" width="35" height="6" fill="#06B6D4" />
    <rect x="540" y="240" width="35" height="6" fill="#06B6D4" />
    <path d="M 535 150 L 580 150 L 557.5 110 Z" fill="url(#dome)" stroke="#0F172A" stroke-width="1"/>
  </g>

  <!-- Airplane -->
  <g transform="translate(540, 150) rotate(-15) scale(0.7)">
    <!-- Shadow -->
    <path d="M -20,35 Q 50,0 120,35 Q 125,40 120,45 Q 50,70 -20,45 Q -25,40 -20,35 Z" fill="#000" opacity="0.3" transform="translate(0, 15)" />
    <!-- Left Wing -->
    <path d="M 20,30 L -30,-5 L -20,30 Z" fill="#CBD5E1" />
    <!-- Right Wing -->
    <path d="M 20,30 L 90,65 L 70,30 Z" fill="#64748B" />
    <!-- Fuselage -->
    <path d="M -20,25 Q 50,-10 120,25 Q 125,30 120,35 Q 50,60 -20,35 Q -25,30 -20,25 Z" fill="#FFFFFF" />
    <!-- Cockpit -->
    <path d="M 100,22 Q 115,25 105,30 Q 95,25 100,22 Z" fill="#0F172A" />
    <!-- Tail -->
    <path d="M -15,28 L -40,5 L -25,30 Z" fill="#0284C7" />
    <path d="M -15,32 L -40,65 L -25,30 Z" fill="#0ea5e9" />
  </g>

  <!-- Dynamic Banner replacing the Flag -->
  <!-- Back Ribbon Tails -->
  <path d="M 20,340 Q 80,300 120,360 L 120,420 Q 80,360 20,420 Z" fill="#0F172A" stroke="url(#gold)" stroke-width="4" />
  <path d="M 780,340 Q 720,300 680,360 L 680,420 Q 720,360 780,420 Z" fill="#0F172A" stroke="url(#gold)" stroke-width="4" />
  
  <!-- Main Banner Body -->
  <path d="M 60,340 
           Q 200,310 400,340 
           Q 600,310 740,340 
           L 720,440 
           Q 600,410 400,440 
           Q 200,410 80,440 Z" 
        fill="url(#bannerBlue)" filter="url(#shadow)" stroke="url(#gold)" stroke-width="8" />

  <!-- Decorative Inner Accent Line on Banner -->
  <path d="M 80,355 
           Q 200,328 400,355 
           Q 600,328 720,355" 
        fill="none" stroke="#60A5FA" stroke-width="2" opacity="0.5" />
  
  <!-- Banner Text "SIETE VIAJES" -->
  <text x="400" y="415" 
        font-family="'Georgia', 'Times New Roman', serif" 
        font-size="64" 
        font-weight="900" 
        fill="#FFFFFF" 
        filter="url(#textShadow)"
        text-anchor="middle"
        letter-spacing="5">SIETE VIAJES</text>

  <!-- "MCHJ" Ribbon -->
  <path d="M 280,440 L 520,440 L 480,490 L 320,490 Z" fill="#0F172A" stroke="url(#gold)" stroke-width="4" filter="url(#shadow)" />
  <text x="400" y="478" 
        font-family="'Arial', sans-serif" 
        font-size="26" 
        font-weight="bold" 
        fill="url(#gold)" 
        text-anchor="middle"
        letter-spacing="8">MCHJ</text>

  <!-- Ornate Flourishes Bottom -->
  <g transform="translate(400, 520)">
    <!-- Central Star Motif -->
    <path d="M 0,-30 L 10,-10 L 30,-5 L 10,5 L 15,25 L 0,10 L -15,25 L -10,5 L -30,-5 L -10,-10 Z" fill="#EF4444" stroke="url(#gold)" stroke-width="2" filter="url(#glow)" />
    
    <!-- Left Jewel -->
    <circle cx="-60" cy="-5" r="12" fill="#06B6D4" stroke="url(#gold)" stroke-width="3" />
    <path d="M -90,-20 Q -60,-30 -40,0" fill="none" stroke="url(#gold)" stroke-width="4" stroke-linecap="round" />
    
    <!-- Right Jewel -->
    <circle cx="60" cy="-5" r="12" fill="#06B6D4" stroke="url(#gold)" stroke-width="3" />
    <path d="M 90,-20 Q 60,-30 40,0" fill="none" stroke="url(#gold)" stroke-width="4" stroke-linecap="round" />

    <!-- Extra flourish curls -->
    <path d="M -110,-5 Q -140,-5 -150,-30" fill="none" stroke="url(#gold)" stroke-width="5" stroke-linecap="round" />
    <path d="M 110,-5 Q 140,-5 150,-30" fill="none" stroke="url(#gold)" stroke-width="5" stroke-linecap="round" />
  </g>
</svg>
