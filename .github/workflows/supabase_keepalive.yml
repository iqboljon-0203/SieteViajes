name: Supabase Keepalive

on:
  schedule:
    # Runs at 00:00 every 3 days (Supabase pauses after 7 days of inactivity)
    - cron: '0 0 */3 * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Send API Request to Supabase
        run: |
          curl -X GET "https://rtqsffcbkrwlwkvtsplp.supabase.co/rest/v1/site_settings?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
